# Serve the built Vite SPA and proxy the API. Mirrors the dev proxy in
# web/vite.config.ts (`/v1` -> control plane), pointed at the compose service.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API: forward /v1/* to the control plane (agent + user/BFF endpoints).
    location /v1/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health passthrough for convenience.
    location = /healthz {
        proxy_pass http://api:8000/healthz;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
