name: Release

# Publish prebuilt agent binaries on a version tag. The installer
# (site/public/install) downloads these from the release's latest/download URL.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish agent binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: agent/go.mod
      - name: Build binaries
        working-directory: agent
        run: |
          mkdir -p ../dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${target%/*}; arch=${target#*/}
            echo "building palisade-$os-$arch"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -trimpath -ldflags "-s -w" \
              -o "../dist/palisade-$os-$arch" ./cmd/palisade
          done
      - name: Checksum binaries
        working-directory: dist
        run: |
          sha256sum palisade-* > SHA256SUMS
          cat SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes --verify-tag
