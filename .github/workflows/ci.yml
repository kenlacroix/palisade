name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + golangci-lint + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff (control-plane)
        working-directory: control-plane
        run: |
          pip install ruff==0.15.18
          ruff check app/
          ruff format --check app/
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: agent/go.mod
      - name: golangci-lint (agent)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          working-directory: agent
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: ESLint + Prettier (web)
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run format:check

  web:
    name: Web (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...

  control-plane:
    name: Control plane (smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control-plane/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Smoke test (SQLite, in-process)
        run: python -m app.smoke_test
      # Unit/API suites (pytest). Run each file in its OWN process: several test
      # modules rebind the module-global db engine + config at import, so a single
      # pooled `pytest app` invocation cross-contaminates. Per-file processes
      # isolate them. live_integration / rls_postgres / smoke have their own jobs.
      - name: Unit tests (pytest, isolated per file)
        run: |
          for f in app/*_test.py; do
            case "$f" in
              app/live_integration_test.py|app/rls_postgres_test.py|app/smoke_test.py) continue ;;
            esac
            echo "== $f =="
            python -m pytest "$f" -q || exit 1
          done
      - name: Migrations apply cleanly
        env:
          DATABASE_URL: sqlite:///./ci_alembic.db
        run: alembic upgrade head
      - name: Migration drift check
        env:
          DATABASE_URL: sqlite:///./ci_alembic.db
        run: alembic check

  integration:
    name: Live integration (agent <-> control plane)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: agent/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control-plane/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Live agent<->control-plane test
        run: python -m app.live_integration_test

  integration-postgres:
    name: Live integration (Postgres / RLS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: palisade
          POSTGRES_PASSWORD: palisade
          POSTGRES_DB: palisade
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U palisade"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: agent/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control-plane/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      # Postgres exercises Row-Level Security / the app.current_org_id GUC, which
      # sqlite skips -- this is the leg that catches RLS regressions.
      - name: Live agent<->control-plane test (Postgres)
        env:
          PALISADE_TEST_DATABASE_URL: postgresql+psycopg://palisade:palisade@localhost:5432/palisade
        run: python -m app.live_integration_test
      # Proves FORCE ROW LEVEL SECURITY (migration 0011) actually isolates the
      # app's own DB role across orgs -- the regression this branch fixes.
      - name: RLS enforcement (Postgres)
        env:
          PALISADE_TEST_DATABASE_URL: postgresql+psycopg://palisade:palisade@localhost:5432/palisade
        run: python -m app.rls_postgres_test

  detections:
    name: Detections (validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: detections
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: detections/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Validate
        run: python validate.py
