id: ollama-modelpull-path-traversal-rce
title: Ollama model-pull path traversal to RCE (Probllama)
cve: CVE-2024-37032
cvss: 8.8
severity: high
category: ai-infra
engine: nuclei
match:
  service: ollama
  versions: "<0.1.34"
# Non-destructive: the real bug is a path traversal in the model-pull digest
# handler that lets an attacker write outside the blob store and reach RCE. We
# only fingerprint the unauthenticated /api/version banner; no manifest or blob
# write is ever attempted.
http:
  - method: GET
    path: /api/version
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words: ['"version"']
remediation: |
  Upgrade Ollama to >=0.1.34. Do not expose the Ollama API (default :11434) to
  untrusted networks — bind it to localhost and front it with an authenticating
  reverse proxy.
references:
  - https://nvd.nist.gov/vuln/detail/CVE-2024-37032
  - https://www.wiz.io/blog/probllama-ollama-vulnerability-cve-2024-37032
signature: stub
