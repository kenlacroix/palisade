id: gitlab-exiftool-preauth-rce
title: GitLab CE/EE pre-auth ExifTool RCE (version exposure)
cve: CVE-2021-22205
cvss: 10.0
severity: critical
category: self-hosted
engine: nuclei
match:
  service: gitlab
  versions: ">=11.9 <13.10.3"
# Non-destructive: the actual exploit uploads a crafted DjVu image. Instead we
# read the unauthenticated /help page, which renders the running GitLab version,
# and gate on it via match.versions server-side. No file upload is performed.
http:
  - method: GET
    path: /help
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words: ["gon.gitlab_url", "GitLab"]
remediation: |
  Upgrade GitLab to 13.10.3, 13.9.6, or 13.8.8 (or later). These releases
  restrict the vulnerable embedded ExifTool DjVu parsing reachable from the
  unauthenticated image upload path. Place GitLab behind authentication/VPN and
  do not expose the instance directly to the internet.
references:
  - https://about.gitlab.com/releases/2021/04/14/security-release-gitlab-13-10-3-released/
  - https://nvd.nist.gov/vuln/detail/CVE-2021-22205
signature: stub
