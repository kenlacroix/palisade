id: confluence-ognl-injection-rce
title: Atlassian Confluence OGNL injection RCE (version exposure)
cve: CVE-2022-26134
cvss: 9.8
severity: critical
category: self-hosted
engine: nuclei
match:
  service: confluence
  versions: ">=1.3.0 <7.4.17 || >=7.13.0 <7.13.7 || >=7.14.0 <7.14.3 || >=7.15.0 <7.15.2 || >=7.16.0 <7.16.4 || >=7.17.0 <7.17.4 || >=7.18.0 <7.18.1"
# Non-destructive: the exploit sends an OGNL payload in the URI path. Here we only
# fingerprint Confluence via its unauthenticated login page, and the patched
# version is gated server-side by match.versions. No OGNL payload is sent.
http:
  - method: GET
    path: /login.action
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words: ["Confluence", "ajs-version-number"]
remediation: |
  Upgrade Confluence Server/Data Center to 7.4.17, 7.13.7, 7.14.3, 7.15.2,
  7.16.4, 7.17.4, or 7.18.1 (or later). If you cannot upgrade immediately, apply
  Atlassian's mitigation and remove the instance from internet exposure.
references:
  - https://confluence.atlassian.com/security/cve-2022-26134-critical-severity-unauthenticated-remote-code-execution-vulnerability-in-confluence-data-center-and-server-1144786087.html
  - https://nvd.nist.gov/vuln/detail/CVE-2022-26134
signature: stub
