id: grafana-https-admin-exposed
title: Grafana admin panel exposed over HTTPS
cve: CVE-2025-30001
cvss: 7.5
severity: high
category: observability
engine: nuclei
scheme: https
match:
  service: grafana
  versions: "<10.4.2"
http:
  - method: GET
    path: /api/admin/settings
    matchers:
      - type: status
        status: [200]
      - type: word
        words: ["\"auth\"", "\"security\""]
remediation: |
  Upgrade Grafana to >=10.4.2 and require an authenticated admin session on
  /api/admin/*. Terminate TLS in front of the panel and never expose it directly
  to the internet.
references:
  - https://grafana.com/security/security-advisories
  - https://nvd.nist.gov/vuln/detail/CVE-2025-30001
signature: stub
