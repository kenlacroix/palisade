# Full Palisade control plane: FastAPI + Postgres. Same artifacts everywhere
# (laptop, Proxmox, VPS) — only the .env values change. Copy .env.example to
# .env and `docker compose up --build`.
#
# Postgres Row-Level Security keyed on org_id is enforced from migration 0003
# (SPEC section 11); CI exercises the RLS path against this postgres:16 service.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-palisade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-palisade}
      POSTGRES_DB: ${POSTGRES_DB:-palisade}
    volumes:
      - palisade_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-palisade}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot schema migration. Runs to completion before any replica boots so
  # the app processes never race to migrate (PALISADE_AUTO_MIGRATE=0 below).
  migrate:
    build:
      context: ..
      dockerfile: control-plane/Dockerfile
    command: ["python", "-m", "app.migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in control-plane/.env (copy .env.example)}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: control-plane/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in control-plane/.env (copy .env.example)}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PALISADE_AUTO_MIGRATE: "0"
      PALISADE_ENV: ${PALISADE_ENV:-dev}
      PALISADE_ENROLL_TOKENS: ${PALISADE_ENROLL_TOKENS:-PLS-DEMO}
      PALISADE_BOOTSTRAP_TOKEN_TTL_S: ${PALISADE_BOOTSTRAP_TOKEN_TTL_S:-86400}
      PALISADE_CORS_ORIGINS: ${PALISADE_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      PALISADE_DEMO_USER_EMAIL: ${PALISADE_DEMO_USER_EMAIL:-demo@palisade.local}
      PALISADE_DEMO_USER_PASSWORD: ${PALISADE_DEMO_USER_PASSWORD:-palisade}
      PALISADE_SESSION_TTL_S: ${PALISADE_SESSION_TTL_S:-604800}
      PALISADE_SIGNING_KEY: ${PALISADE_SIGNING_KEY:-}
      PALISADE_REQUIRE_MTLS: ${PALISADE_REQUIRE_MTLS:-}
      PALISADE_MTLS_HEADER: ${PALISADE_MTLS_HEADER:-x-client-cert}
      PALISADE_MTLS_CERT_DAYS: ${PALISADE_MTLS_CERT_DAYS:-397}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PALISADE_SEED_DEMO: ${PALISADE_SEED_DEMO:-}
      PALISADE_DEMO_MODE: ${PALISADE_DEMO_MODE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    # Live-edit detections locally without a rebuild; image carries them for prod.
    volumes:
      - ../detections:/app/detections:ro

  # Durable background work (AI triage, alert delivery). Same image as api.
  worker:
    build:
      context: ..
      dockerfile: control-plane/Dockerfile
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in control-plane/.env (copy .env.example)}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PALISADE_TRIAGE_MODEL: ${PALISADE_TRIAGE_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ../detections:/app/detections:ro

volumes:
  palisade_pg:
